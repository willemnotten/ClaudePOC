<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0f08">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GridWalker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:      #39ff6e;
      --green-dim:  rgba(57,255,110,0.18);
      --green-faint:rgba(57,255,110,0.08);
      --red:        #ff3b3b;
      --bg:         #0a0f08;
      --panel:      rgba(6,12,6,0.88);
      --text:       #a8f0bc;
      --text-dim:   rgba(168,240,188,0.45);
      --border:     rgba(57,255,110,0.22);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Courier New', Courier, monospace;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── MAP ─────────────────────────────────── */
    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #0a0f08;
    }

    /* Desaturate + darken tiles for tactical feel */
    .leaflet-tile-pane { filter: saturate(0.45) brightness(0.72) contrast(1.05); }

    /* Grid canvas lives inside the map container (rotates with it) */
    #grid-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 450;
    }

    /* Leaflet attribution minimal */
    .leaflet-control-attribution {
      background: rgba(0,0,0,0.5) !important;
      color: var(--text-dim) !important;
      font-family: 'Courier New', monospace !important;
      font-size: 9px !important;
    }

    /* ── HUD ─────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      z-index: 800;
      pointer-events: none;
      /* scanlines */
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
    }

    /* ── TOP BAR ─────────────────────────────── */
    #hud-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: env(safe-area-inset-top, 12px) 14px 0;
      padding-top: max(env(safe-area-inset-top), 12px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
    }

    /* compass */
    #compass-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #compass {
      width: 52px; height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      background: var(--panel);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px rgba(57,255,110,0.12), inset 0 0 8px rgba(0,0,0,0.5);
      position: relative;
      pointer-events: auto;
      transition: box-shadow 0.3s;
    }

    #compass-label {
      position: absolute;
      top: 4px;
      font-size: 7px;
      letter-spacing: 0.1em;
      color: var(--red);
      font-weight: bold;
    }

    #compass-needle {
      position: relative;
      width: 2px; height: 28px;
      transition: transform 0.25s ease-out;
    }
    #compass-needle::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-bottom: 14px solid var(--red);
      margin-left: -2.5px;
    }
    #compass-needle::after {
      content: '';
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 14px solid var(--text-dim);
      margin-left: -2.5px;
    }

    #bearing-val {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* stats panel */
    #stats {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 8px 11px;
      font-size: 10px;
      line-height: 1.9;
      letter-spacing: 0.05em;
      backdrop-filter: blur(6px);
    }

    #stats .lbl { color: var(--text-dim); }
    #stats .val { color: var(--green); }

    /* ── BOTTOM BAR ──────────────────────────── */
    #hud-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 14px 16px max(env(safe-area-inset-bottom), 20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
    }

    .hud-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* player color picker */
    #color-row {
      font-size: 10px;
      letter-spacing: 0.09em;
      color: var(--text-dim);
      pointer-events: auto;
    }
    #player-color {
      width: 32px; height: 22px;
      border: 1.5px solid var(--border);
      background: none;
      cursor: pointer;
      vertical-align: middle;
      margin-left: 6px;
      padding: 1px;
    }

    /* buttons */
    .btn {
      pointer-events: auto;
      background: transparent;
      border: 1.5px solid var(--green);
      color: var(--green);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      padding: 9px 18px;
      cursor: pointer;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      transition: background 0.12s, color 0.12s;
    }
    .btn:active { background: var(--green); color: #000; }
    .btn:disabled { border-color: var(--border); color: var(--text-dim); cursor: not-allowed; }
    .btn.primary { background: var(--green); color: #000; font-weight: bold; }
    .btn.primary:active { opacity: 0.75; }

    .btn-sim {
      border-color: rgba(255,200,50,0.6);
      color: rgba(255,200,50,0.8);
      font-size: 10px;
      padding: 7px 14px;
    }
    .btn-sim:active { background: rgba(255,200,50,0.6); color: #000; }
    .btn-sim.active-sim {
      background: rgba(255,200,50,0.15);
      border-color: rgba(255,200,50,0.9);
      color: rgba(255,200,50,1);
    }

    #status-msg {
      font-size: 10px;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      text-align: center;
      min-height: 14px;
    }

    /* ── PLAYER MARKER ───────────────────────── */
    .player-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.4), 0 0 14px currentColor;
      transition: background 0.3s;
    }

    /* ── SIM MODE TOAST ──────────────────────── */
    #sim-toast {
      position: fixed;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--panel);
      border: 1px solid rgba(255,200,50,0.5);
      color: rgba(255,200,50,0.9);
      font-size: 11px;
      letter-spacing: 0.07em;
      padding: 10px 20px;
      z-index: 900;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #sim-toast.show { opacity: 1; }

    /* radius input */
    #radius-wrap {
      font-size: 10px;
      letter-spacing: 0.09em;
      color: var(--text-dim);
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #radius-input {
      width: 56px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      text-align: center;
      padding: 2px 4px;
    }
  </style>
</head>
<body>

<div id="map"></div>
<canvas id="grid-canvas"></canvas>

<div id="hud">
  <div id="hud-top">
    <div id="compass-wrap">
      <div id="compass">
        <span id="compass-label">N</span>
        <div id="compass-needle"></div>
      </div>
      <span id="bearing-val">000°</span>
    </div>

    <div id="stats">
      <span class="lbl">LAT  </span><span class="val" id="s-lat">—</span><br>
      <span class="lbl">LNG  </span><span class="val" id="s-lng">—</span><br>
      <span class="lbl">ACC  </span><span class="val" id="s-acc">— m</span><br>
      <span class="lbl">CLAIM</span><span class="val" id="s-claim">0</span>
      <span class="lbl"> / </span><span class="val" id="s-total">—</span>
    </div>
  </div>

  <div id="hud-bottom">
    <div class="hud-row">
      <div id="color-row">
        KLEUR <input type="color" id="player-color" value="#ff6622">
      </div>
      <div id="radius-wrap">
        STRAAL <input type="number" id="radius-input" value="300" min="50" max="2000" step="50"> m
      </div>
    </div>

    <div class="hud-row">
      <button id="btn-start" class="btn primary" disabled>📍 Bepaal speelgebied</button>
      <button id="btn-sim" class="btn btn-sim">🖱 Simuleer</button>
    </div>

    <div id="status-msg">Wacht op GPS locatie…</div>
  </div>
</div>

<div id="sim-toast">Klik op de kaart om te bewegen</div>

<script>
// ═══════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const CELL_M = 10;          // 10 × 10 metre cells
const M_PER_LAT = 111320;

// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
const G = {
  started:      false,
  center:       null,   // {lat,lng}
  playerPos:    null,   // {lat,lng}
  bearing:      0,
  color:        '#ff6622',
  cells:        new Map(),   // key → {visited,claimed,claimedBy}
  playable:     new Set(),   // keys within radius
  simMode:      false,
  watchId:      null,
};

// ═══════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════
const map = L.map('map', {
  zoomControl: false,
  attributionControl: true,
  tap: false,
  preferCanvas: true,
}).setView([52.370, 4.895], 17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20,
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  keepBuffer: 6,
  updateWhenIdle: false,
  updateWhenZooming: false,
}).addTo(map);

// ── Canvas overlay ──────────────────────────
const canvas = document.getElementById('grid-canvas');
const ctx    = canvas.getContext('2d');

// Inject canvas into the map container so it rotates with the map
const mapContainer = map.getContainer();
mapContainer.appendChild(canvas);

function resizeCanvas() {
  const sz = map.getSize();
  canvas.width  = sz.x;
  canvas.height = sz.y;
  canvas.style.width  = sz.x + 'px';
  canvas.style.height = sz.y + 'px';
  redraw();
}

// ── Player marker ───────────────────────────
let playerMarker    = null;
let accuracyCircle  = null;

function mPerLng(lat) { return M_PER_LAT * Math.cos(lat * Math.PI / 180); }

// ═══════════════════════════════════════════
// GRID HELPERS
// ═══════════════════════════════════════════
function posToCell(lat, lng) {
  if (!G.center) return null;
  const dy = (lat - G.center.lat) * M_PER_LAT;
  const dx = (lng - G.center.lng) * mPerLng(G.center.lat);
  return { i: Math.floor(dx / CELL_M), j: Math.floor(dy / CELL_M) };
}

function cellBounds(i, j) {
  const { lat: cLat, lng: cLng } = G.center;
  const mLat = M_PER_LAT;
  const mLng = mPerLng(cLat);
  return L.latLngBounds(
    [ cLat + (j     * CELL_M) / mLat,  cLng + (i     * CELL_M) / mLng ],
    [ cLat + ((j+1) * CELL_M) / mLat,  cLng + ((i+1) * CELL_M) / mLng ]
  );
}

function cellKey(i, j) { return `${i},${j}`; }

function generatePlayable(cLat, cLng, radiusM) {
  const r = Math.ceil(radiusM / CELL_M) + 1;
  const result = new Set();
  for (let i = -r; i <= r; i++) {
    for (let j = -r; j <= r; j++) {
      const cx = (i + 0.5) * CELL_M;
      const cy = (j + 0.5) * CELL_M;
      if (Math.sqrt(cx*cx + cy*cy) <= radiusM) {
        result.add(cellKey(i, j));
      }
    }
  }
  return result;
}

// ═══════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════
function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

function redraw() {
  const sz = map.getSize();
  canvas.width  = sz.x;
  canvas.height = sz.y;
  ctx.clearRect(0, 0, sz.x, sz.y);

  if (!G.started || !G.center) return;

  const bounds = map.getBounds();

  // Step 1 — dark fog across entire canvas
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(0,6,0,0.83)';
  ctx.fillRect(0, 0, sz.x, sz.y);

  G.playable.forEach(key => {
    const [i, j] = key.split(',').map(Number);
    const cb = cellBounds(i, j);
    if (!bounds.overlaps(cb)) return;

    const sw = map.latLngToContainerPoint(cb.getSouthWest());
    const ne = map.latLngToContainerPoint(cb.getNorthEast());
    const x  = Math.min(sw.x, ne.x);
    const y  = Math.min(sw.y, ne.y);
    const w  = Math.abs(ne.x - sw.x);
    const h  = Math.abs(ne.y - sw.y);

    const cell = G.cells.get(key);

    if (cell && cell.visited) {
      // Step 2a — punch full hole through fog (reveal map)
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fillRect(x, y, w, h);

      // Step 2b — draw claim color on top
      ctx.globalCompositeOperation = 'source-over';
      if (cell.claimed) {
        ctx.fillStyle = hexToRgba(cell.claimedBy, 0.42);
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = hexToRgba(cell.claimedBy, 0.85);
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 0.75, y + 0.75, w - 1.5, h - 1.5);
      } else {
        // visited, unclaimed — faint grid line
        ctx.strokeStyle = 'rgba(57,255,110,0.20)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x, y, w, h);
      }
    } else {
      // Step 3 — unvisited: partial fog lift to hint at grid
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fillRect(x, y, w, h);

      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = 'rgba(57,255,110,0.12)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, w, h);
    }
  });

  ctx.globalCompositeOperation = 'source-over';
}

map.on('move zoom moveend zoomend', redraw);
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 80);

// ═══════════════════════════════════════════
// PLAYER POSITION UPDATE
// ═══════════════════════════════════════════
function setPlayerPos(lat, lng, acc) {
  G.playerPos = { lat, lng };

  document.getElementById('s-lat').textContent  = lat.toFixed(5);
  document.getElementById('s-lng').textContent  = lng.toFixed(5);
  if (acc !== undefined) document.getElementById('s-acc').textContent = Math.round(acc) + ' m';

  const ll = L.latLng(lat, lng);

  if (!playerMarker) {
    const icon = L.divIcon({
      className: '',
      html: `<div class="player-dot" style="background:${G.color};color:${G.color}"></div>`,
      iconSize: [18, 18], iconAnchor: [9, 9],
    });
    playerMarker = L.marker(ll, { icon, zIndexOffset: 1000 }).addTo(map);
  } else {
    playerMarker.setLatLng(ll);
    // update color if changed
    const dot = playerMarker.getElement()?.querySelector('.player-dot');
    if (dot) { dot.style.background = G.color; dot.style.color = G.color; }
  }

  if (acc !== undefined) {
    if (!accuracyCircle) {
      accuracyCircle = L.circle(ll, {
        radius: acc, color: '#39ff6e',
        fillColor: '#39ff6e', fillOpacity: 0.04,
        weight: 1, opacity: 0.25,
      }).addTo(map);
    } else {
      accuracyCircle.setLatLng(ll).setRadius(acc);
    }
  }

  if (!G.simMode) {
    map.setView(ll, map.getZoom(), { animate: true, duration: 0.6 });
  }

  if (G.started) claimCurrentCell();
}

// ═══════════════════════════════════════════
// GPS
// ═══════════════════════════════════════════
function startGPS() {
  if (!navigator.geolocation) { setStatus('GPS niet beschikbaar'); return; }

  G.watchId = navigator.geolocation.watchPosition(pos => {
    const { latitude: lat, longitude: lng, accuracy, heading } = pos.coords;
    setPlayerPos(lat, lng, accuracy);

    if (heading !== null && !isNaN(heading)) setBearing(heading);

    if (!G.started) {
      document.getElementById('btn-start').disabled = false;
      setStatus('GPS gevonden — druk "Bepaal speelgebied" om te starten');
    }
  }, err => {
    setStatus('GPS fout: ' + err.message + ' — gebruik simulatiemodus');
  }, { enableHighAccuracy: true, maximumAge: 2000, timeout: 12000 });
}

// ═══════════════════════════════════════════
// COMPASS / BEARING
// ═══════════════════════════════════════════
function setBearing(deg) {
  G.bearing = deg;
  const d = Math.round(deg);
  document.getElementById('compass-needle').style.transform = `rotate(${deg}deg)`;
  document.getElementById('bearing-val').textContent = String(d).padStart(3,'0') + '°';
  // Rotate map container; canvas rotates with it
  mapContainer.style.transform       = `rotate(${-deg}deg)`;
  mapContainer.style.transformOrigin = '50% 50%';
}

// Device orientation
function handleOrientation(e) {
  const alpha = e.webkitCompassHeading ?? (e.alpha ? 360 - e.alpha : null);
  if (alpha !== null) setBearing(alpha);
}
window.addEventListener('deviceorientationabsolute', handleOrientation, true);
window.addEventListener('deviceorientation',         handleOrientation, true);

// ═══════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════
function startGame() {
  if (!G.playerPos && !G.simMode) {
    setStatus('Nog geen locatie beschikbaar…'); return;
  }

  const origin = G.playerPos || map.getCenter();
  G.center  = { lat: origin.lat ?? origin.lat, lng: origin.lng ?? origin.lng };
  G.started = true;
  G.cells   = new Map();

  const radiusM = parseInt(document.getElementById('radius-input').value) || 300;
  G.playable = generatePlayable(G.center.lat, G.center.lng, radiusM);

  document.getElementById('btn-start').textContent = '🔄 Herstart';
  document.getElementById('s-total').textContent   = G.playable.size;
  document.getElementById('s-claim').textContent   = '0';

  setStatus(`${G.playable.size} velden van ${CELL_M}×${CELL_M}m — loop er doorheen om te claimen`);
  redraw();

  if (G.simMode && G.playerPos) claimCurrentCell();
}

function claimCurrentCell() {
  if (!G.started || !G.playerPos) return;
  const c = posToCell(G.playerPos.lat, G.playerPos.lng);
  if (!c) return;
  const key = cellKey(c.i, c.j);
  if (!G.playable.has(key)) return;

  const cell = G.cells.get(key) || { visited: false, claimed: false, claimedBy: null };
  if (!cell.visited || !cell.claimed) {
    cell.visited   = true;
    cell.claimed   = true;
    cell.claimedBy = G.color;
    G.cells.set(key, cell);

    const n = [...G.cells.values()].filter(v => v.claimed).length;
    document.getElementById('s-claim').textContent = n;
    redraw();
  }
}

// ═══════════════════════════════════════════
// SIMULATION MODE
// ═══════════════════════════════════════════
let simActive = false;
const simToast = document.getElementById('sim-toast');

document.getElementById('btn-sim').addEventListener('click', () => {
  simActive = !simActive;
  G.simMode = simActive;
  const btn = document.getElementById('btn-sim');
  btn.classList.toggle('active-sim', simActive);

  if (simActive) {
    // Use map center as starting player pos
    const c = map.getCenter();
    setPlayerPos(c.lat, c.lng, 5);
    document.getElementById('btn-start').disabled = false;
    setStatus('Simulatiemodus actief — klik op de kaart om te bewegen');
    simToast.classList.add('show');
    setTimeout(() => simToast.classList.remove('show'), 2800);
  } else {
    setStatus('Simulatiemodus uitgeschakeld');
  }
});

map.on('click', e => {
  if (!simActive) return;
  const { lat, lng } = e.latlng;
  // Simulate heading from last pos
  if (G.playerPos) {
    const dlat = lat - G.playerPos.lat;
    const dlng = lng - G.playerPos.lng;
    const heading = (Math.atan2(dlng, dlat) * 180 / Math.PI + 360) % 360;
    setBearing(heading);
  }
  setPlayerPos(lat, lng, 3);
});

// ═══════════════════════════════════════════
// UI EVENTS
// ═══════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click', startGame);

document.getElementById('player-color').addEventListener('input', e => {
  G.color = e.target.value;
});

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
setStatus('Locatie ophalen…');
startGPS();
</script>
</body>
</html>
